[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
markers =
    unit: fast pure-logic tests that do not touch the network
    integration: real-network tests hitting live data sources (Tencent/AKShare/EastMoney/Sina) — opt-in with `-m integration`
    slow: tests that can take more than a few seconds
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
